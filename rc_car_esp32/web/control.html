<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>ESP32 RC Car Control</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background: #f4f4f4;
    }

    h1 {
      margin-bottom: 30px;
    }

    button {
      width: 120px;
      height: 60px;
      margin: 8px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #333;
      color: white;
    }

    button:active {
      background: #777;
    }

    .stop {
      background: #c0392b;
    }
  </style>
</head>
<body>
  <h1>ESP32 RC Car</h1>

  <div>
    <button onclick="sendCommand('forward')">전진</button>
  </div>

  <div>
    <button onclick="sendCommand('left')">좌회전</button>
    <button class="stop" onclick="sendCommand('stop')">정지</button>
    <button onclick="sendCommand('right')">우회전</button>
  </div>

  <div>
    <button onclick="sendCommand('backward')">후진</button>
  </div>

  <p id="status">대기 중</p>

  <script>
    const esp32_ip = "http://192.168.0.25";

    function sendCommand(cmd) {
      fetch(`${esp32_ip}/control?cmd=${cmd}`)
        .then(response => response.text())
        .then(data => {
          document.getElementById("status").innerText = `명령 전송: ${cmd}`;
          console.log(data);
        })
        .catch(error => {
          document.getElementById("status").innerText = "연결 실패";
          console.error(error);
        });
    }
  </script>
</body>
</html>
